name: Build and Release

on:
  push:
    branches: [ main ]
    tags:      [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore LenovoController.sln

      - name: Build
        run: dotnet build LenovoController.sln --configuration Release --no-restore

      - name: Publish
        run: >
          dotnet publish LenovoController.csproj
          --configuration Release
          --runtime win-x64
          --self-contained false
          --output bin/publish

      - name: Build Installer
        run: iscc LenovoController.iss

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: LenovoController
          path: bin/publish/

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: LenovoController-Installer
          path: installer/

  release:
    needs: build
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download app artifact
        uses: actions/download-artifact@v4
        with:
          name: LenovoController
          path: publish/

      - name: Download installer artifact
        uses: actions/download-artifact@v4
        with:
          name: LenovoController-Installer
          path: installer/

      - name: Zip portable build
        run: Compress-Archive -Path publish/* -DestinationPath LenovoController.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            LenovoController.zip
            installer/LenovoController_Setup_3.0.0.1.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
