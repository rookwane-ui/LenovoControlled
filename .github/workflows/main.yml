name: Build and Release

on:
  push:
    branches: [ main ]
    tags:      [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore LenovoController.sln

      - name: Build
        run: dotnet build LenovoController.sln --configuration Release --no-restore

      - name: Publish
        run: |
          dotnet publish LenovoController.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            --output publish/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LenovoController
          path: publish/

  release:
    needs: build
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: LenovoController
          path: publish/

      - name: Download Inno Setup
        run: |
          choco install innosetup --no-progress
          echo "C:\Program Files (x86)\Inno Setup 6" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Create installer
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          iscc /DAppVersion=$version LenovoController.iss

      - name: Upload Setup to Release
        uses: softprops/action-gh-release@v2
        with:
          files: Output/LenovoController-Setup.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
